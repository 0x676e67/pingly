<head>

    <title>Pingly Protocol Inspector</title>
    <script>
        (() => {
            let theme;
            try {
                const stored = window.localStorage.getItem("pingly-theme");
                if (stored === "light" || stored === "dark") {
                    theme = stored;
                }
            } catch (_) {
                // The system preference remains available when storage is blocked.
            }

            theme ??= window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
            const root = document.documentElement;

            // Primer supplies the palette; these variables bridge it to Tabler components.
            window.pinglyPrimerTheme = Object.freeze({
                shared: Object.freeze({
                    "--tblr-active-bg": "var(--bgColor-neutral-muted)",
                    "--tblr-azure": "var(--fgColor-accent)",
                    "--tblr-azure-lt": "var(--bgColor-accent-muted)",
                    "--tblr-backdrop-bg": "var(--bgColor-inset)",
                    "--tblr-bg-forms": "var(--bgColor-inset)",
                    "--tblr-bg-surface": "var(--card-bgColor)",
                    "--tblr-bg-surface-dark": "var(--bgColor-inset)",
                    "--tblr-bg-surface-primary": "var(--bgColor-default)",
                    "--tblr-bg-surface-secondary": "var(--bgColor-default)",
                    "--tblr-bg-surface-tertiary": "var(--bgColor-muted)",
                    "--tblr-blue": "var(--fgColor-accent)",
                    "--tblr-blue-lt": "var(--bgColor-accent-muted)",
                    "--tblr-body-bg": "var(--bgColor-default)",
                    "--tblr-body-color": "var(--fgColor-default)",
                    "--tblr-border-active-color": "var(--borderColor-emphasis)",
                    "--tblr-border-color": "var(--borderColor-default)",
                    "--tblr-border-color-translucent": "var(--borderColor-muted)",
                    "--tblr-code-bg": "var(--bgColor-accent-muted)",
                    "--tblr-code-color": "var(--fgColor-accent)",
                    "--tblr-danger": "var(--fgColor-danger)",
                    "--tblr-danger-lt": "var(--bgColor-danger-muted)",
                    "--tblr-disabled-bg": "var(--bgColor-disabled)",
                    "--tblr-disabled-color": "var(--fgColor-disabled)",
                    "--tblr-emphasis-color": "var(--fgColor-onEmphasis)",
                    "--tblr-focus-ring-color": "var(--borderColor-accent-muted)",
                    "--tblr-green": "var(--fgColor-success)",
                    "--tblr-green-lt": "var(--bgColor-success-muted)",
                    "--tblr-icon-color": "var(--fgColor-muted)",
                    "--tblr-info": "var(--fgColor-accent)",
                    "--tblr-info-lt": "var(--bgColor-accent-muted)",
                    "--tblr-link-color": "var(--fgColor-accent)",
                    "--tblr-link-hover-color": "var(--fgColor-link)",
                    "--tblr-list-group-action-hover-bg": "var(--bgColor-neutral-muted)",
                    "--tblr-list-group-action-hover-color": "var(--fgColor-default)",
                    "--tblr-list-group-active-bg": "var(--bgColor-neutral-muted)",
                    "--tblr-list-group-active-border-color": "var(--borderColor-muted)",
                    "--tblr-list-group-active-color": "var(--fgColor-default)",
                    "--tblr-nav-pills-link-active-bg": "var(--button-default-bgColor-active)",
                    "--tblr-nav-pills-link-active-color": "var(--button-default-fgColor-rest)",
                    "--tblr-orange": "var(--fgColor-severe)",
                    "--tblr-orange-lt": "var(--bgColor-severe-muted)",
                    "--tblr-primary": "var(--button-primary-bgColor-rest)",
                    "--tblr-primary-fg": "var(--fgColor-onEmphasis)",
                    "--tblr-primary-lt": "var(--bgColor-success-muted)",
                    "--tblr-purple": "var(--fgColor-done)",
                    "--tblr-purple-lt": "var(--bgColor-done-muted)",
                    "--tblr-red": "var(--fgColor-danger)",
                    "--tblr-red-lt": "var(--bgColor-danger-muted)",
                    "--tblr-secondary": "var(--fgColor-muted)",
                    "--tblr-secondary-bg": "var(--bgColor-muted)",
                    "--tblr-secondary-color": "var(--fgColor-muted)",
                    "--tblr-secondary-lt": "var(--bgColor-neutral-muted)",
                    "--tblr-shadow-border": "inset 0 0 0 1px var(--borderColor-muted)",
                    "--tblr-shadow-card": "none",
                    "--tblr-tertiary-bg": "var(--bgColor-inset)",
                    "--tblr-tertiary-color": "var(--fgColor-muted)",
                    "--tblr-warning": "var(--fgColor-attention)",
                    "--tblr-warning-lt": "var(--bgColor-attention-muted)",
                }),
                light: Object.freeze({
                    "--tblr-azure-rgb": "9, 105, 218",
                    "--tblr-blue-rgb": "9, 105, 218",
                    "--tblr-body-bg-rgb": "255, 255, 255",
                    "--tblr-body-color-rgb": "31, 35, 40",
                    "--tblr-danger-rgb": "209, 36, 47",
                    "--tblr-emphasis-color-rgb": "255, 255, 255",
                    "--tblr-green-rgb": "26, 127, 55",
                    "--tblr-info-rgb": "9, 105, 218",
                    "--tblr-orange-rgb": "188, 76, 0",
                    "--tblr-primary-rgb": "31, 136, 61",
                    "--tblr-purple-rgb": "130, 80, 223",
                    "--tblr-red-rgb": "209, 36, 47",
                    "--tblr-secondary-bg-rgb": "246, 248, 250",
                    "--tblr-secondary-color-rgb": "89, 99, 110",
                    "--tblr-secondary-rgb": "89, 99, 110",
                    "--tblr-tertiary-bg-rgb": "246, 248, 250",
                    "--tblr-tertiary-color-rgb": "89, 99, 110",
                    "--tblr-warning-rgb": "154, 103, 0",
                }),
                dark: Object.freeze({
                    "--tblr-azure-rgb": "71, 139, 230",
                    "--tblr-blue-rgb": "71, 139, 230",
                    "--tblr-body-bg-rgb": "33, 40, 48",
                    "--tblr-body-color-rgb": "209, 215, 224",
                    "--tblr-danger-rgb": "244, 112, 103",
                    "--tblr-emphasis-color-rgb": "240, 246, 252",
                    "--tblr-green-rgb": "87, 171, 90",
                    "--tblr-info-rgb": "71, 139, 230",
                    "--tblr-orange-rgb": "246, 157, 80",
                    "--tblr-primary-rgb": "52, 125, 57",
                    "--tblr-purple-rgb": "152, 110, 226",
                    "--tblr-red-rgb": "244, 112, 103",
                    "--tblr-secondary-bg-rgb": "38, 44, 54",
                    "--tblr-secondary-color-rgb": "145, 152, 161",
                    "--tblr-secondary-rgb": "145, 152, 161",
                    "--tblr-tertiary-bg-rgb": "21, 27, 35",
                    "--tblr-tertiary-color-rgb": "145, 152, 161",
                    "--tblr-warning-rgb": "218, 170, 63",
                }),
            });

            window.applyPinglyPrimerTheme = function (selectedTheme) {
                const palette = window.pinglyPrimerTheme;
                root.dataset.theme = selectedTheme;
                root.dataset.bsTheme = selectedTheme;
                root.dataset.colorMode = selectedTheme;
                root.dataset.lightTheme = "light";
                root.dataset.darkTheme = "dark_dimmed";

                [palette.shared, palette[selectedTheme] || palette.light].forEach(
                    function (values) {
                        Object.entries(values).forEach(function (entry) {
                            root.style.setProperty(entry[0], entry[1]);
                        });
                    }
                );
            };

            window.applyPinglyPrimerTheme(theme);
        })();
    </script>

<body>

        <div class="page-wrapper">
